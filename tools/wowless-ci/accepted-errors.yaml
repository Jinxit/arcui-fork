# Wowless accepted-error baseline for ArcUI CI.
#
# Each entry records a known error that is expected to appear when running ArcUI
# under wowless. CI fails if the observed error set diverges from this list in
# either direction (see tools/wowless-ci/README.md for re-validation steps).
#
# Fields:
#   file            - repo-relative path of the originating Lua file
#   signature       - normalized error message (no timestamp, no line numbers,
#                     0x... addresses replaced with 0xADDR)
#   category        - wowless-bug | addon-upstream-bug | addon-fork-bug
#   acceptedOnBuild - _G.WowlessData.Build.build when this entry was validated
#   acceptedOnVersion - _G.WowlessData.Build.version (human-readable, informational)
#   note            - rationale and root cause
#   upstreamRef     - upstream issue URL if tracked (optional)

- file: ArcUI_CooldownBars.lua
  signature: "bad argument #-1 to 'GetNodeInfo' (table expected, got nil)"
  category: wowless-bug
  acceptedOnBuild: "67823"
  acceptedOnVersion: "12.0.5"
  note: >
    Wowless's hand-written C_Traits.GetNodeInfo implementation is stale vs the
    current TraitNodeInfo schema. It omits required non-nilable fields
    (entryIDToRanksIncreased: table, isDisplayError, ranksIncreased,
    totalMaxRanks). The output-structure coercion throws on the missing
    table-typed field. Our call in ScanPlayerSpells is correct. Adding the
    missing fields to the wowless impl eliminates the throw (verified locally).
  upstreamRef: ""

- file: ArcUI_Minimap.lua
  signature: "SetText: number expected, got no value"
  category: wowless-bug
  acceptedOnBuild: "67823"
  acceptedOnVersion: "12.0.5"
  note: >
    Wowless's FontString/Font API is not fully implemented. The tooltip
    OnTooltipShow handler calls tooltip:SetText() which hits an unimplemented
    path. Our call is correct per the GameTooltip API.
  upstreamRef: "https://github.com/wowless/wowless/issues/597"

- file: ArcUI_CooldownReminder.lua
  signature: "RegisterEvent: unknown event PLAYER_EQUIPED_SPELLS_CHANGED"
  category: addon-upstream-bug
  acceptedOnBuild: "67823"
  acceptedOnVersion: "12.0.5"
  note: >
    The event name PLAYER_EQUIPED_SPELLS_CHANGED is misspelled/nonexistent and
    was inherited verbatim from upstream ArcUI (identical on origin/upstream and
    origin/main; the fork did not introduce or modify it). It never fires
    in-game so the Healthstone/item-charge path hung off it is dead code. This
    is a real latent bug, not merely a harness artifact. Prefer fixing upstream
    or reporting it over permanently accepting it. Track as a follow-up.
  upstreamRef: ""

- file: CDM_Module/Arc_Auras/ArcUI_ArcAuras.lua
  signature: "RegisterEvent: unknown event PLAYER_EQUIPED_SPELLS_CHANGED"
  category: addon-upstream-bug
  acceptedOnBuild: "67823"
  acceptedOnVersion: "12.0.5"
  note: >
    Same misspelled event as in ArcUI_CooldownReminder.lua — also inherited
    verbatim from upstream ArcUI. See that entry for root cause and follow-up.
  upstreamRef: ""
