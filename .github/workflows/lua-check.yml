name: Lua checks

on:
  pull_request:
    branches: [main]
    paths: ['**.lua']

jobs:
  # Fast pre-check: pure syntax (luac -p catches parse errors in milliseconds).
  luac-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua
        run: sudo apt-get update && sudo apt-get install -y lua5.4

      - name: Syntax check all Lua files
        run: |
          failed=0
          while IFS= read -r file; do
            if ! luac5.4 -p "$file" 2>&1; then
              failed=1
            fi
          done < <(find . -name '*.lua' -not -path './.git/*')
          exit $failed

  # Static analysis with WoW-API-aware luacheck.
  luacheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install luacheck
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1 luarocks
          sudo luarocks install luacheck

      - name: Collect changed Lua files
        run: |
          git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.sha }}"
          git diff --name-only --diff-filter=ACMRT \
            "${{ github.event.pull_request.base.sha }}" HEAD \
            -- '*.lua' \
            | grep -v '^Libs/' > /tmp/luacheck-files || true

      - name: Run luacheck
        run: |
          if [ ! -s /tmp/luacheck-files ]; then
            echo "No changed Lua files to lint."
            exit 0
          fi
          mapfile -t lua_files < /tmp/luacheck-files
          luacheck "${lua_files[@]}" \
            --config .luacheckrc \
            --no-cache \
            --formatter plain
