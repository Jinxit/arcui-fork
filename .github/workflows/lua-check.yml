name: Lua checks

on:
  pull_request:
    branches: [main]
    paths: ['**.lua']

jobs:
  # Fast pre-check: pure syntax (luac -p catches parse errors in milliseconds).
  luac-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua
        run: sudo apt-get update && sudo apt-get install -y lua5.4

      - name: Syntax check all Lua files
        run: |
          failed=0
          while IFS= read -r file; do
            if ! luac5.4 -p "$file" 2>&1; then
              failed=1
            fi
          done < <(find . -name '*.lua' -not -path './.git/*')
          exit $failed

  # Static analysis with WoW-API-aware luacheck.
  luacheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install luacheck
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1 luarocks
          sudo luarocks install luacheck

      - name: Run luacheck
        run: |
          luacheck . \
            --config .luacheckrc \
            --exclude-files 'Libs/**' \
            --no-cache \
            --formatter plain
