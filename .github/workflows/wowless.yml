name: Wowless CI + luacheck

on:
  pull_request:
    branches: [main]
    paths: ['**.lua']

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: run ArcUI under the wowless headless WoW interpreter and verify
  # that the observed error set exactly matches the accepted-errors baseline.
  # The wowless binary and TACT client data live in the fleet runner image;
  # this job pulls and runs that image — it does NOT build wowless from source.
  # ---------------------------------------------------------------------------
  wowless-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull runner image
        run: docker pull ghcr.io/jinxit/agents-runner:latest

      - name: Extract wowless build info
        run: |
          docker run --rm \
            --workdir /opt/wowless \
            ghcr.io/jinxit/agents-runner:latest \
            cat /opt/wowless/products/wow/WowlessData/build.lua \
            > wowless-build.lua
          echo "Wowless build info:"
          cat wowless-build.lua

      - name: Run wowless against addon
        # wowless exits 0 even when errors are present; use || true so the step
        # does not short-circuit.  The matcher step owns the pass/fail decision.
        run: |
          docker run --rm \
            --workdir /opt/wowless \
            -v "${{ github.workspace }}:/addon" \
            ghcr.io/jinxit/agents-runner:latest \
            /opt/wowless/wowless_wow run -p wow --addondir /addon \
            > wowless-output.txt 2>&1 || true
          echo "--- wowless output ---"
          cat wowless-output.txt

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install matcher dependencies
        run: pip install pyyaml

      - name: Run error matcher
        run: |
          python3 tools/wowless-ci/match-errors.py \
            --output        wowless-output.txt \
            --build-lua     wowless-build.lua \
            --baseline      tools/wowless-ci/accepted-errors.yaml \
            --addon-mount   /addon

  # ---------------------------------------------------------------------------
  # Job 2: static analysis with luacheck (WoW-API-aware config).
  # Runs in parallel with the wowless job; no Docker needed.
  # Subsumes the existing luac -p syntax check.
  # ---------------------------------------------------------------------------
  luacheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install luacheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y lua5.1 luarocks
          sudo luarocks install luacheck

      - name: Run luacheck
        run: luacheck . --config .luacheckrc
