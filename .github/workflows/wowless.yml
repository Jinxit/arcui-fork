name: Wowless CI + luacheck

on:
  pull_request:
    branches: [main]
    paths: ['**.lua']

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: run ArcUI under the wowless headless WoW interpreter and verify
  # that the observed error set exactly matches the accepted-errors baseline.
  # The wowless binary and TACT client data live in the fleet runner image;
  # this job pulls and runs that image — it does NOT build wowless from source.
  # ---------------------------------------------------------------------------
  wowless-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull runner image
        run: docker pull ghcr.io/jinxit/agents-runner:latest

      - name: Extract wowless build info
        run: |
          docker run --rm \
            --workdir /opt/wowless \
            ghcr.io/jinxit/agents-runner:latest \
            cat /opt/wowless/products/wow/WowlessData/build.lua \
            > wowless-build.lua
          echo "Wowless build info:"
          cat wowless-build.lua

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Bootstrap wowless schema database
        run: |
          python3 - <<'PY'
          import sqlite3

          conn = sqlite3.connect("wow_schema.sqlite3")
          cur = conn.cursor()
          cur.executescript("""
          CREATE TABLE IF NOT EXISTS ChrSpecialization (
            ID INTEGER,
            ClassID INTEGER,
            OrderIndex INTEGER,
            Name_lang TEXT,
            FemaleName_lang TEXT,
            Description_lang TEXT,
            SpellIconFileID INTEGER,
            Role INTEGER,
            MasterySpellID INTEGER,
            ChrSpecializationID INTEGER
          );
          CREATE TABLE IF NOT EXISTS ChrClasses (
            ID INTEGER,
            Name_lang TEXT,
            Filename TEXT,
            ClassName_lang TEXT,
            DisplayName_lang TEXT,
            IconFileDataID INTEGER
          );
          CREATE TABLE IF NOT EXISTS ChrRaces (
            ID INTEGER,
            Name_lang TEXT,
            ClientFileString TEXT,
            Filename TEXT
          );
          CREATE TABLE IF NOT EXISTS InventorySlot (
            ID INTEGER,
            Name TEXT,
            IconFileID INTEGER
          );
          CREATE TABLE IF NOT EXISTS FileData (
            ID INTEGER,
            FileName TEXT,
            FilePath TEXT
          );
          CREATE TABLE IF NOT EXISTS SkillLine (
            ID INTEGER,
            DisplayName_lang TEXT,
            Flags INTEGER
          );
          CREATE TABLE IF NOT EXISTS SkillLineXTraitTree (
            SkillLineID INTEGER,
            TraitTreeID INTEGER
          );
          CREATE TABLE IF NOT EXISTS ItemSubclass (
            ClassID INTEGER,
            SubClassID INTEGER,
            DisplayName_lang TEXT,
            VerboseName_lang TEXT,
            Flags INTEGER
          );
          CREATE TABLE IF NOT EXISTS ItemClass (
            ClassID INTEGER,
            ID INTEGER,
            ClassName_lang TEXT,
            Name_lang TEXT
          );
          CREATE TABLE IF NOT EXISTS TraitNode (
            ID INTEGER,
            TraitTreeID INTEGER,
            PosX INTEGER,
            PosY INTEGER,
            Type INTEGER,
            Flags INTEGER
          );
          CREATE TABLE IF NOT EXISTS TraitEdge (
            ID INTEGER,
            LeftTraitNodeID INTEGER,
            RightTraitNodeID INTEGER,
            Type INTEGER,
            VisualStyle INTEGER
          );
          CREATE TABLE IF NOT EXISTS TraitNodeXTraitCond (
            ID INTEGER,
            TraitNodeID INTEGER,
            TraitCondID INTEGER
          );
          CREATE TABLE IF NOT EXISTS TraitCond (
            ID INTEGER,
            TraitNodeID INTEGER,
            TraitTreeID INTEGER,
            Type INTEGER,
            CondType INTEGER,
            QuestID INTEGER,
            AchievementID INTEGER,
            SpecSetID INTEGER,
            TraitNodeGroupID INTEGER,
            TraitCurrencyID INTEGER,
            SpentAmountRequired INTEGER,
            Flags INTEGER
          );
          CREATE TABLE IF NOT EXISTS TraitNodeGroupXTraitNode (
            ID INTEGER,
            TraitNodeGroupID INTEGER,
            TraitNodeID INTEGER,
            "Index" INTEGER
          );
          CREATE TABLE IF NOT EXISTS TraitNodeGroup (
            ID INTEGER,
            Flags INTEGER
          );
          CREATE TABLE IF NOT EXISTS TraitNodeGroupXTraitCond (
            ID INTEGER,
            TraitNodeGroupID INTEGER,
            TraitCondID INTEGER
          );
          CREATE TABLE IF NOT EXISTS SpecSetMember (
            ID INTEGER,
            SpecSetID INTEGER,
            SpecSet INTEGER,
            ChrSpecializationID INTEGER
          );
          CREATE TABLE IF NOT EXISTS TraitNodeXTraitNodeEntry (
            ID INTEGER,
            TraitNodeID INTEGER,
            TraitNodeEntryID INTEGER,
            "Index" INTEGER
          );
          CREATE TABLE IF NOT EXISTS TraitNodeEntry (
            ID INTEGER,
            TraitDefinitionID INTEGER,
            MaxRanks INTEGER,
            TraitSubTreeID INTEGER,
            Type INTEGER
          );
          CREATE TABLE IF NOT EXISTS UiTextureAtlasMember (
            ID INTEGER,
            UiTextureAtlasID INTEGER,
            CommittedName TEXT,
            Width INTEGER,
            Height INTEGER,
            LeftTexCoord REAL,
            RightTexCoord REAL,
            TopTexCoord REAL,
            BottomTexCoord REAL,
            CommittedLeft INTEGER,
            CommittedRight INTEGER,
            CommittedTop INTEGER,
            CommittedBottom INTEGER,
            CommittedFlags INTEGER
          );
          CREATE TABLE IF NOT EXISTS UiTextureAtlas (
            ID INTEGER,
            FileDataID INTEGER,
            Width INTEGER,
            Height INTEGER,
            AtlasWidth INTEGER,
            AtlasHeight INTEGER
          );
          CREATE TABLE IF NOT EXISTS UiTextureAtlasElement (
            ID INTEGER,
            UiTextureAtlasID INTEGER,
            Name TEXT,
            CommittedName TEXT,
            Width INTEGER,
            Height INTEGER,
            LeftTexCoord REAL,
            RightTexCoord REAL,
            TopTexCoord REAL,
            BottomTexCoord REAL
          );
          """)
          conn.commit()
          conn.close()
          PY

      - name: Run wowless against addon
        # wowless exits 0 even when errors are present; use || true so the step
        # does not short-circuit.  The matcher step owns the pass/fail decision.
        run: |
          docker run --rm \
            --workdir /opt/wowless \
            --user root \
            -v "${{ github.workspace }}:/addon" \
            ghcr.io/jinxit/agents-runner:latest \
            sh -lc 'mkdir -p /opt/wowless/build && \
              ln -sfn /opt/wowless/products /opt/wowless/build/products && \
              cp /addon/wow_schema.sqlite3 /opt/wowless/build/wow_schema.sqlite3 && \
              /opt/wowless/wowless_wow run -p wow --addondir /addon --lite' \
            > wowless-output.txt 2>&1 || true
          echo "--- wowless output ---"
          cat wowless-output.txt

      - name: Install matcher dependencies
        run: pip install pyyaml

      - name: Run error matcher
        run: |
          python3 tools/wowless-ci/match-errors.py \
            --output        wowless-output.txt \
            --build-lua     wowless-build.lua \
            --baseline      tools/wowless-ci/accepted-errors.yaml \
            --addon-mount   /addon

  # ---------------------------------------------------------------------------
  # Job 2: static analysis with luacheck (WoW-API-aware config).
  # Runs in parallel with the wowless job; no Docker needed.
  # Subsumes the existing luac -p syntax check.
  # ---------------------------------------------------------------------------
  luacheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install luacheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y lua5.1 luarocks
          sudo luarocks install luacheck

      - name: Run luacheck
        run: luacheck . --config .luacheckrc
